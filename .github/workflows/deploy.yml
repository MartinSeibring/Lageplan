name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - staging
      - development

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Deploy production (main → /)
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
          exclude_assets: '.github,.git,server.py,README.md'

      - name: Deploy staging (staging → /staging/)
        if: github.ref_name == 'staging'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: staging
          keep_files: true
          exclude_assets: '.github,.git,server.py,README.md'

      - name: Deploy development (development → /dev/)
        if: github.ref_name == 'development'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: dev
          keep_files: true
          exclude_assets: '.github,.git,server.py,README.md'
